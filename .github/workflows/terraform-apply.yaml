name: "terraform apply"

permissions:
  id-token: write # This is required for requesting the JWT
  contents: read # This is required for actions/checkout
  pull-requests: write

on:
  push:
    branches:
    - main
    - master
    paths:
    - terraform/**
  workflow_dispatch:
    inputs:
      directory:
        description: "Target directory (leave empty to run all)"
        required: false
        default: ""
        type: choice
        options:
        - ""
        - terraform/harvestasya.org
        - terraform/suzutan.jp
jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      directories: ${{ steps.set-matrix.outputs.directories }}
    steps:
    - id: set-matrix
      run: |
        if [ -n "${{ github.event.inputs.directory }}" ]; then
          echo "directories=[\"${{ github.event.inputs.directory }}\"]" >> $GITHUB_OUTPUT
        else
          echo 'directories=["terraform/harvestasya.org","terraform/suzutan.jp"]' >> $GITHUB_OUTPUT
        fi

  apply:
    name: terraform apply
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory: ${{ fromJson(needs.setup.outputs.directories) }}
    env:
      # Cloudflare
      TF_VAR_cloudflare_account_id: ${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_cloudflare_api_token: ${{ secrets.TF_VAR_CLOUDFLARE_API_TOKEN }}
      TF_VAR_google_oauth_client_id: ${{ secrets.TF_VAR_GOOGLE_OAUTH_CLIENT_ID }}
      TF_VAR_google_oauth_client_secret: ${{ secrets.TF_VAR_GOOGLE_OAUTH_CLIENT_SECRET }}
      # Keycloak (Service Account Client Credentials)
      TF_VAR_keycloak_client_secret: ${{ secrets.TF_VAR_KEYCLOAK_CLIENT_SECRET }}
      TF_VAR_cf_access_client_id: ${{ secrets.TF_VAR_CF_ACCESS_CLIENT_ID }}
      TF_VAR_cf_access_client_secret: ${{ secrets.TF_VAR_CF_ACCESS_CLIENT_SECRET }}
      # GitHub Organization Management (GitHub App)
      TF_VAR_github_app_id: ${{ secrets.TF_VAR_GITHUB_APP_ID }}
      TF_VAR_github_app_installation_id: ${{ secrets.TF_VAR_GITHUB_APP_INSTALLATION_ID }}
      TF_VAR_github_app_pem_file: ${{ secrets.TF_VAR_GITHUB_APP_PEM_FILE }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
    - uses: actions/checkout@v6
    - name: configure aws credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/TerraformBackendAccessForGitHubActions
        aws-region: ap-northeast-3

    - name: terraform apply
      uses: dflook/terraform-apply@v2
      with:
        path: ${{ matrix.directory }}
        auto_approve: true
